<!DOCTYPE html>
<html>
<head>
<title>PUPA Login</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:30px;
border-radius:12px;
width:300px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
margin:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#4CAF50;
color:white;
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#43a047;
}

</style>

</head>

<body>

<div class="card">

<h2>PUPA Pet System</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script>

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user==="admin" && pass==="1234"){

window.location.href="register.html";

}
else{

document.getElementById("msg").innerHTML="Wrong login";

}

}

</script>

</body>
</html>
