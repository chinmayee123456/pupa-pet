<!DOCTYPE html>
<html>
<head>
<title>Pupa Pet Login</title>

<style>

body{
font-family: Arial;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
width:300px;
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#45a049;
}

#msg{
color:red;
margin-top:10px;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Pupa Pet Login</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script>

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user==="admin" && pass==="1234"){

window.location.href="register.html";

}
else{

document.getElementById("msg").innerText="Wrong Username or Password";

}

}

</script>

</body>
</html>
