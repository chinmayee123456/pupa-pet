<!DOCTYPE html>
<html>
<head>
<title>Pupa Pet - Register</title>

<style>
body{
font-family:Arial;
background:#f2f4f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
width:320px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#43a047;
}

a{
color:#4CAF50;
text-decoration:none;
}

</style>
</head>

<body>

<div class="box">

<h2>🐾 Register Your Account</h2>

<input id="username" placeholder="Enter Username">

<input id="password" type="password" placeholder="Create Password">

<button onclick="register()">Register</button>

<p style="margin-top:15px;">
Already have an account?
<a href="login.html">Login</a>
</p>

<p id="msg"></p>

</div>

<script>

function register(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

let pattern=/^(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$]).{8,}$/;

if(user==""){
document.getElementById("msg").innerText="Enter username";
return;
}

if(!pattern.test(pass)){
document.getElementById("msg").innerText="Password must have 8 chars, capital letter, number, special character";
return;
}

localStorage.setItem("user",user);
localStorage.setItem("pass",pass);

alert("Registration successful");

window.location.href="login.html";

}

</script>

</body>
</html>
