<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Pets</title>
<link rel="stylesheet" href="style.css">

<!-- Firebase compat scripts -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<!-- Firebase config -->
<script src="firebase.js"></script>

<style>
body { font-family:'Segoe UI', sans-serif; background:#f2f4f8; margin:0; padding:0; }
header { background:#4e8cff; color:white; padding:15px 0; text-align:center; }
main { max-width:900px; margin:30px auto; padding:20px; background:white; border-radius:10px; display:flex; flex-wrap:wrap; justify-content:center; gap:15px; }
.pet-card { width:220px; padding:10px; background:#e0f0ff; border-radius:10px; text-align:center; box-shadow:0 3px 8px rgba(0,0,0,0.1); }
.pet-card img { width:100%; height:180px; object-fit:cover; border-radius:10px; }
</style>
</head>
<body>
<header><h1>Your Pets</h1></header>
<main id="petsContainer"></main>

<script>
window.onload = async () => {
  const params = new URLSearchParams(window.location.search);
  const userId = params.get("userId");
  if(!userId){ alert("Login first"); window.location.href="login.html"; return; }

  const container = document.getElementById("petsContainer");

  try {
    const snapshot = await window.db.collection("pets").where("userId","==",userId).get();

    if(snapshot.empty){
      container.innerHTML = "<p>No pets registered yet!</p>";
      return;
    }

    snapshot.forEach(doc => {
      const data = doc.data();
      const card = document.createElement("div");
      card.classList.add("pet-card");
      card.innerHTML = `
        <h3>${data.name}</h3>
        <p>${data.type}</p>
        <img src="${data.imageUrl}" alt="${data.name}">
      `;
      container.appendChild(card);
    });
  } catch(err){
    console.error(err);
    alert("Error loading pets: "+err.message);
  }
};
</script>
</body>
</html>
