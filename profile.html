<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script src="firebase.js"></script>
</head>
<body>
<header><h1>Your Pets</h1></header>
<main id="petsContainer"></main>

<script>
window.onload = async () => {
  const params = new URLSearchParams(window.location.search);
  const userId = params.get("userId");
  if(!userId){ alert("Login first"); window.location.href="login.html"; return; }

  const container = document.getElementById("petsContainer");
  const snapshot = await db.collection("pets").where("userId","==",userId).get();

  snapshot.forEach(doc => {
    const data = doc.data();
    const card = document.createElement("div");
    card.classList.add("pet-card");
    card.innerHTML = `<h3>${data.name}</h3>
                      <p>${data.type}</p>
                      <img src="${data.imageUrl}" alt="${data.name}">`;
    container.appendChild(card);
  });
};
</script>
</body>
</html>
