<!DOCTYPE html>
<html>
<head>
<title>Lost Pet Info</title>
</head>

<body>

<h1>Pet Information</h1>

<p id="petname"></p>
<p id="owner"></p>
<p id="phone"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAajQDEx-_EIWI0Ur1QiHWuc1v2Gq_qsRc",
  authDomain: "pupa-pet.firebaseapp.com",
  projectId: "pupa-pet",
  storageBucket: "pupa-pet.firebasestorage.app",
  messagingSenderId: "782314476536",
  appId: "1:782314476536:web:92f6d14f6c670f655abc0d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

async function loadPet() {

const docRef = doc(db, "pets", id);
const docSnap = await getDoc(docRef);

if (docSnap.exists()) {

document.getElementById("petname").innerHTML =
"Pet Name: " + docSnap.data().pet_name;

document.getElementById("owner").innerHTML =
"Owner: " + docSnap.data().Owner;

document.getElementById("phone").innerHTML =
"Phone: " + docSnap.data().phone;

}
}

loadPet();

</script>

</body>
</html>
