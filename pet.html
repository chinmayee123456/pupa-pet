<!DOCTYPE html>
<html>
<head>
  <title>Pupa Pet ID</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAajQDEx-_EIWI0Ur1QiHWuc1v2Gq_qsRc",
      authDomain: "pupa-pet.firebaseapp.com",
      projectId: "pupa-pet",
      storageBucket: "pupa-pet.firebasestorage.app",
      messagingSenderId: "782314476536",
      appId: "1:782314476536:web:92f6d14f6c670f655abc0d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const petId = params.get("id");

    async function loadPet() {
      const docRef = doc(db, "pets", petId);
      const docSnap = await getDoc(docRef);

      if (docSnap.exists()) {
        const data = docSnap.data();

        document.getElementById("petName").innerText = data.name;
        document.getElementById("petBreed").innerText = data.breed;
        document.getElementById("ownerName").innerText = data.owner;
        document.getElementById("phone").innerText = data.phone;
      } else {
        document.getElementById("card").innerHTML = "Pet not found";
      }
    }

    loadPet();
  </script>

  <style>
    body{
      font-family: Arial;
      background:#f4f6fb;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .card{
      background:white;
      padding:30px;
      border-radius:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
      width:320px;
      text-align:center;
    }

    .peticon{
      font-size:50px;
    }

    h1{
      margin:10px 0;
      color:#333;
    }

    .info{
      margin:10px 0;
      font-size:18px;
      color:#555;
    }

    .callbtn{
      margin-top:20px;
      display:inline-block;
      padding:12px 20px;
      background:#4CAF50;
      color:white;
      text-decoration:none;
      border-radius:8px;
      font-weight:bold;
    }

    .callbtn:hover{
      background:#43a047;
    }

  </style>

</head>

<body>

<div class="card" id="card">

<div class="peticon">🐾</div>

<h1 id="petName">Loading...</h1>

<div class="info">Breed: <span id="petBreed"></span></div>

<div class="info">Owner: <span id="ownerName"></span></div>

<div class="info">Phone: <span id="phone"></span></div>

<a class="callbtn" id="callButton">📞 Call Owner</a>

</div>

<script>
setTimeout(()=>{
  const phone = document.getElementById("phone").innerText;
  document.getElementById("callButton").href = "tel:"+phone;
},1000);
</script>

</body>
</html>
