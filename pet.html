<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pupa Pet - Pets</title>
  <link rel="stylesheet" href="style.css">
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAajQDEx-_EIWI0Ur1QiHWuc1v2Gq_qsRc",
      authDomain: "pupa-pet.firebaseapp.com",
      projectId: "pupa-pet",
      storageBucket: "pupa-pet.firebasestorage.app",
      messagingSenderId: "782314476536",
      appId: "1:782314476536:web:92f6d14f6c670f655abc0d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    function addPet() {
      const name = document.getElementById('petName').value;
      const type = document.getElementById('petType').value;

      db.collection("pets").add({
        name: name,
        type: type,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      })
      .then(() => alert("Pet added!"))
      .catch(err => console.error(err));
    }
  </script>
</head>
<body>
  <header>
    <h1>Pupa Pet Management</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="pet.html">Pets</a>
    </nav>
  </header>

  <main>
    <h2>Add a Pet</h2>
    <input type="text" id="petName" placeholder="Pet Name" />
    <input type="text" id="petType" placeholder="Pet Type" />
    <button onclick="addPet()">Add Pet</button>
  </main>
</body>
</html>
