<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pupa Pet Tracker</title>
<link rel="stylesheet" href="style.css">

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<!-- QR Code library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- Firebase Config -->
<script src="firebase.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f2f4f8;
  margin: 0;
}
header {
  background: #4e8cff;
  color: white;
  padding: 15px;
  text-align: center;
}
nav a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}
nav a:hover { color: #ffd700; }
main {
  max-width: 900px;
  margin: 30px auto;
  padding: 20px;
  background: white;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
input, button {
  width: 95%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 5px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}
button {
  background: #4e8cff;
  color: white;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}
button:hover { background: #3467c1; }
.pet-card {
  display: inline-block;
  width: 220px;
  margin: 10px;
  padding: 10px;
  background: #e0f0ff;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}
.pet-card img { width: 100%; border-radius: 10px; }
</style>
</head>
<body>
<header>
  <h1>Pupa Pet Tracker</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
    <a href="pet.html">Pets</a>
  </nav>
</header>

<main>
  <h2>Register a Pet</h2>
  <form id="petForm">
    <input type="text" id="petName" placeholder="Pet Name" required />
    <input type="text" id="petType" placeholder="Pet Type" required />
    <input type="text" id="ownerName" placeholder="Owner Name" required />
    <input type="text" id="ownerPhone" placeholder="Owner Phone Number" required />
    <input type="file" id="petImage" accept="image/*" required />
    <button type="button" id="addPetBtn">Add Pet</button>
  </form>

  <h2>Registered Pets</h2>
  <div id="petContainer"></div>
</main>

<script>
// Add pet handler
document.getElementById("addPetBtn").addEventListener("click", () => {
  const name = document.getElementById('petName').value.trim();
  const type = document.getElementById('petType').value.trim();
  const owner = document.getElementById('ownerName').value.trim();
  const phone = document.getElementById('ownerPhone').value.trim();
  const imageFile = document.getElementById('petImage').files[0];

  if(!name || !type || !owner || !phone || !imageFile) return alert("All fields are required!");

  const storageRef = storage.ref('pets/' + Date.now() + '_' + imageFile.name);
  storageRef.put(imageFile).then(snapshot => {
    snapshot.ref.getDownloadURL().then(url => {
      const qrData = JSON.stringify({name, owner, phone});

      db.collection("pets").add({
        name,
        type,
        owner,
        phone,
        imageUrl: url,
        qrData,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(() => {
        alert("Pet added successfully!");
        document.getElementById('petForm').reset();
        loadPets();
      }).catch(err => console.error(err));
    });
  });
});

// Load all pets
function loadPets() {
  const container = document.getElementById('petContainer');
  container.innerHTML = "";
  db.collection("pets").orderBy("createdAt","desc").get().then(snapshot => {
    snapshot.forEach(doc => {
      const data = doc.data();

      const card = document.createElement('div');
      card.className = 'pet-card';
      card.innerHTML = `
        <img src="${data.imageUrl}" alt="${data.name}">
        <h3>${data.name}</h3>
        <p>Type: ${data.type}</p>
        <p>Owner: ${data.owner}</p>
      `;
      const qrDiv = document.createElement('div');
      new QRCode(qrDiv, {
        text: data.qrData,
        width: 120,
        height: 120
      });
      card.appendChild(qrDiv);
      container.appendChild(card);
    });
  });
}

window.onload = loadPets;
</script>
</body>
</html>
