<!DOCTYPE html>
<html>
<head>

<title>Pupa Pet Registration</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
width:350px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#link{
margin-top:15px;
word-break:break-all;
color:green;
}

</style>

</head>

<body>

<div class="box">

<h2>🐾 Register Your Pet</h2>

<input id="petName" placeholder="Pet Name">

<input id="breed" placeholder="Breed">

<input id="owner" placeholder="Owner Name">

<input id="phone" placeholder="Phone Number">

<button onclick="createPet()">Create Pet Profile</button>

<p id="link"></p>

</div>


<!-- LOGIN PROTECTION -->
<script>

if(localStorage.getItem("loggedIn")!=="true"){

window.location.href="login.html";

}

</script>


<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>


<script>

const firebaseConfig = {

apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT_ID",

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();


function createPet(){

let petName=document.getElementById("petName").value;
let breed=document.getElementById("breed").value;
let owner=document.getElementById("owner").value;
let phone=document.getElementById("phone").value;

db.collection("pets").add({

name:petName,
breed:breed,
owner:owner,
phone:phone

})

.then((doc)=>{

let link=window.location.origin+"/pupa-pet/pet.html?id="+doc.id;

document.getElementById("link").innerHTML=
"Pet profile created!<br><br>"+link;

});

}

</script>

</body>
</html>
