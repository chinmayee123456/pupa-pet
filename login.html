<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Register</title>
<link rel="stylesheet" href="style.css">

<!-- Firebase compat scripts -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<!-- Firebase config -->
<script src="firebase.js"></script>
</head>
<body>
<header><h1>Login / Register</h1></header>
<main>
<form id="loginForm">
  <input type="email" id="email" placeholder="Email" required>
  <input type="password" id="password" placeholder="Password (min 6 chars)" required>
  <button type="submit">Login / Register</button>
</form>
</main>

<script>
const form = document.getElementById("loginForm");

form.addEventListener("submit", async e => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(password.length < 6){
    return alert("Password must be at least 6 characters");
  }

  try {
    // Try to log in
    const userCredential = await window.auth.signInWithEmailAndPassword(email, password);
    const uid = userCredential.user.uid;
    window.location.href = `addPet.html?userId=${uid}`;
  } catch(err) {
    if(err.code === "auth/user-not-found"){
      // If user doesn't exist, create account
      try {
        const newUser = await window.auth.createUserWithEmailAndPassword(email, password);
        const uid = newUser.user.uid;
        alert("Account created successfully!");
        window.location.href = `addPet.html?userId=${uid}`;
      } catch(err2){
        alert("Error creating account: " + err2.message);
      }
    } else if(err.code === "auth/wrong-password") {
      alert("Wrong password! Please try again.");
    } else {
      alert("Login error: " + err.message);
    }
  }
});
</script>
</body>
</html>
