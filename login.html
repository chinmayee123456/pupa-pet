<!DOCTYPE html>
<html>
<head>
<title>Pupa Pet Login</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
width:320px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#43a047;
}

.rules{
font-size:12px;
text-align:left;
color:#555;
margin-top:10px;
}

#msg{
color:red;
margin-top:10px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Pupa Pet Login</h2>

<input id="username" placeholder="Enter Username or Email">

<input id="password" type="password" placeholder="Create Password">

<div class="rules">

Password must contain:

<ul>
<li>At least 8 characters</li>
<li>One uppercase letter</li>
<li>One number</li>
<li>One special character (!@#$)</li>
</ul>

</div>

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script>

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

let pattern=/^(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*]).{8,}$/;

if(user=="" ){

document.getElementById("msg").innerText="Please enter username";

return;

}

if(!pattern.test(pass)){

document.getElementById("msg").innerText="Password does not meet requirements";

return;

}

window.location.href="register.html";

}

</script>

</body>
</html>
